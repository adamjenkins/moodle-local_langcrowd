name: Moodle Plugin CI

on:
  push:
    branches:
      - main
      - 'MOODLE_*'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: moodle
          POSTGRES_PASSWORD: moodle
          POSTGRES_DB: moodle
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            moodle-branch: MOODLE_52_STABLE
            database: pgsql
          - php: '8.3'
            moodle-branch: MOODLE_52_STABLE
            database: pgsql
          - php: '8.2'
            moodle-branch: MOODLE_51_STABLE
            database: pgsql
          - php: '8.3'
            moodle-branch: MOODLE_51_STABLE
            database: pgsql

    steps:
      - name: Check out plugin repository
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pgsql, xml, curl, zip, intl, soap
          ini-values: max_input_vars=5000
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$GITHUB_WORKSPACE/ci/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/ci/vendor/bin" >> $GITHUB_PATH

      - name: Install Moodle (${{ matrix.moodle-branch }})
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --db-host 127.0.0.1 \
            --db-user moodle \
            --db-pass moodle \
            --db-name moodle \
            --db-type ${{ matrix.database }} \
            --branch ${{ matrix.moodle-branch }} \
            --no-init
        env:
          DB: ${{ matrix.database }}

      - name: PHP lint
        if: always()
        run: moodle-plugin-ci phplint ./plugin

      - name: Plugin validate
        if: always()
        run: moodle-plugin-ci validate -m ${{ github.workspace }}/moodle ./plugin

      - name: Moodle coding standards
        if: always()
        run: moodle-plugin-ci codechecker ./plugin

      - name: Code quality (phpmd)
        if: always()
        run: moodle-plugin-ci phpmd ./plugin

      - name: Upgrade savepoints
        if: always()
        run: moodle-plugin-ci savepoints ./plugin

      - name: PHPUnit tests
        if: always()
        run: moodle-plugin-ci phpunit -m ${{ github.workspace }}/moodle ./plugin
